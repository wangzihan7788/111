<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Birthday Invite</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .invite-card {
            background: white;
            width: 600px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 3px solid #ff99cc;
        }
        h1 {
            color: #ff66b2;
            text-align: center;
            font-size: 36px;
            margin: 0 0 20px;
            text-shadow: 2px 2px #ffe6f2;
        }
        .date {
            color: #3399ff;
            font-size: 24px;
            margin: 0 0 20px;
            text-align: left;
        }
        .cake-img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        h3 {
            color: #ff66b2;
            font-size: 20px;
            margin-bottom: 15px;
        }
        ul {
            color: #333;
            font-size: 18px;
            line-height: 1.6;
            margin: 0 0 25px;
            padding-left: 25px;
        }
        .location {
            color: #3399ff;
            font-size: 18px;
        }
        .location a {
            color: #0066cc;
            text-decoration: none;
            border-bottom: 1px dashed #0066cc;
        }
        .location a:hover {
            color: #ff66b2;
            border-bottom: 1px solid #ff66b2;
        }
    </style>
</head>
<body>
    <div class="invite-card">
        <h1>Let's Celebrate My Birthday!</h1>
        <p class="date">📅 Save the Date: 25th June</p >
        <img src="https://picsum.photos/id/292/600/400" alt="Colorful Birthday Cake" class="cake-img">
        
        <h3>What to bring:</h3>
        <ul>
            <li>Your biggest smile 😊</li>
            <li>Your favorite snack to share 🍪</li>
            <li>An empty stomach for cake & pizza 🍕</li>
            <li>Your best party dance moves 💃</li>
        </ul>

        <h3>This is where we'll party:</h3>
        <p class="location">
            <a href=" " target="_blank">Sunny Park Pavilion (Google Map Link)</a >
        </p >
    </div>
</body>
</html>
